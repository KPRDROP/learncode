name: SportsOnline Stream Extractor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-streams:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp brotli

      - name: Download prog.txt
        run: |
          curl -k -L "https://sportsonline.sc/prog.txt" -o prog.txt

      - name: Run extractor
        run: |
          python onlinesp.py

      - name: Verify playlist
        run: |
          ls -lah onlinesp_tivimate.m3u8
          wc -l onlinesp_tivimate.m3u8

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add onlinesp_tivimate.m3u8 prog.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update playlist [skip ci]"
          git push

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportsonline-playlist
          path: onlinesp_tivimate.m3u8
          retention-days: 7
