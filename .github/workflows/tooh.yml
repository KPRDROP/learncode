name: Generate TOOH M3U8

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp
          pip install playwright httpx[http2] pytz
          
      - name: Run TOOH scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run the main script directly since fooh.py has if __name__ == "__main__"
          python -c "import asyncio; from fooh import main; asyncio.run(main())"
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add fooh_vlc.m3u8 fooh_tivimate.m3u8
          git diff --staged --quiet || git commit -m "Update TOOH M3U8 files [skip ci]"
          git push
