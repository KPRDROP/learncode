name:  Play Updater

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout repo
        uses: actions/checkout@v4

      - name:  Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name:  Install deps
        run: |
          pip install playwright selectolax httpx[http2] pytz
          python -m playwright install chromium

      - name:  Run updater
        env:
          EMBED_BASE_URL: ${{ secrets.PLAY_BASE_URL }}
        run: |
          python play.py

      - name:  Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.m3u8
          git commit -m "Update embed playlists" || echo "No changes"
          git push
