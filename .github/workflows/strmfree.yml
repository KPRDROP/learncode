name: StrmFree Playlist Builder

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright httpx[http2] pytz
          playwright install --with-deps chromium

      - name: Run playlist builder
        env:
          STRM_FREE_API_URL: ${{ secrets.STRM_FREE_API_URL }}
        run: |
          python strmfree.py

      - name: Commit and push changes
        if: success()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add strmfree_tivimate.m3u8
          git diff --staged --quiet || git commit -m "Update StrmFree playlist - $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push origin main
