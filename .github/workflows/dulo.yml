name: Auto-Update Dulo Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install cloudscraper requests
    
    - name: Run Dulo.tv scraper
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
      run: python dulo.py
    
    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add dulo_tivimate.m3u8 dulo_cache.json
        git diff --staged --quiet && echo "No changes" || (git commit -m "Update Dulo.tv playlist $(date '+%Y-%m-%d %H:%M:%S')" && git pull --rebase origin main && git push origin main)
